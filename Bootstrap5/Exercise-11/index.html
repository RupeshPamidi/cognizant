<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 11: Cards and Media Objects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Exercise 11.1: Profile Card</h2>
        <div class="card mt-4" style="width: 300px;">
            <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Profile">
            <div class="card-body">
                <h5 class="card-title">John Doe</h5>
                <p class="card-text">Web Developer and Designer</p>
                <button class="btn btn-primary">View Profile</button>
            </div>
        </div>

        <h2 class="mt-5">Exercise 11.2: Media Object Layout</h2>
        <div class="d-flex mt-4">
            <img src="https://via.placeholder.com/100" class="me-3 rounded" alt="Avatar" style="width: 100px; height: 100px;">
            <div>
                <h5>Media Heading</h5>
                <p>This is a media object with an image on the left and text content on the right. The image and content are aligned horizontally.</p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
