<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 19: Customization with Sass</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bs-primary: #FF6B6B;
            --bs-secondary: #4ECDC4;
            --border-radius: 15px;
        }
        
        .btn {
            border-radius: var(--border-radius) !important;
        }
        
        .card {
            border-radius: var(--border-radius) !important;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-primary">Bootstrap 5 Customization with Sass</h1>
        <p class="lead">This example demonstrates customizing Bootstrap primary colors and border radius.</p>

        <div class="row mt-5">
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Custom Primary Color</h5>
                        <p class="card-text">The primary color has been customized to a custom red.</p>
                        <button class="btn btn-primary">Custom Button</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Custom Border Radius</h5>
                        <p class="card-text">Border radius has been customized to 15px.</p>
                        <button class="btn btn-secondary">Secondary Button</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
