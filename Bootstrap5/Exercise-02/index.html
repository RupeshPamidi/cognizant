<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2: Bootstrap Structure and Files</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Bootstrap Structure Exploration</h1>
        <div class="row mt-4">
            <div class="col-md-4">
                <h5>CSS Folder</h5>
                <p>Contains compiled Bootstrap stylesheets: bootstrap.css and bootstrap.min.css</p>
            </div>
            <div class="col-md-4">
                <h5>JS Folder</h5>
                <p>Contains compiled Bootstrap JavaScript plugins: bootstrap.js and bootstrap.bundle.min.js</p>
            </div>
            <div class="col-md-4">
                <h5>SCSS Folder</h5>
                <p>Contains source Sass files for customization</p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
