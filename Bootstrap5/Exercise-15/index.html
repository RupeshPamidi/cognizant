<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 15: Borders, Shadows, and Rounded Corners</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Exercise 15.1: Border Utilities</h2>
        <div class="row mt-4">
            <div class="col-md-4">
                <img src="https://via.placeholder.com/200" class="img-fluid border border-primary border-3 rounded-circle" alt="Circular Image">
            </div>
            <div class="col-md-4">
                <img src="https://via.placeholder.com/200" class="img-fluid border border-success rounded" alt="Rounded Image">
            </div>
            <div class="col-md-4">
                <img src="https://via.placeholder.com/200" class="img-fluid border border-3 rounded-pill" alt="Pill Image">
            </div>
        </div>

        <h2 class="mt-5">Exercise 15.2: Shadows and Rounded Corners</h2>
        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card shadow p-4">
                    <img src="https://via.placeholder.com/300x200" class="card-img-top rounded-pill mb-3" alt="Card Image">
                    <h5>Standard Shadow</h5>
                    <p>This card has a standard shadow effect</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-lg p-4">
                    <h5>Large Shadow</h5>
                    <p>This card has a larger shadow effect</p>
                    <button class="btn btn-primary rounded-pill">Action</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
