<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 12: Spacing Utilities</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Exercise 12.1: Spacing Examples</h2>
        <div class="bg-light p-3 m-3">
            <p>This section has padding (p-3) and margin (m-3)</p>
        </div>
        <div class="bg-info text-white mt-4 p-4">
            <p>This has margin-top (mt-4) and padding (p-4)</p>
        </div>
        <div class="bg-success text-white py-5">
            <p>This has vertical padding (py-5)</p>
        </div>

        <h2 class="mt-5">Exercise 12.2: Pricing Section</h2>
        <div class="row mt-4">
            <div class="col-md-4 mb-4">
                <div class="card p-4 text-center">
                    <h5 class="mb-3">Basic Plan</h5>
                    <p class="lead fw-bold mb-3">$9.99</p>
                    <ul class="list-unstyled mb-4">
                        <li class="py-2">Feature 1</li>
                        <li class="py-2">Feature 2</li>
                    </ul>
                    <button class="btn btn-primary">Choose Plan</button>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card p-4 text-center">
                    <h5 class="mb-3">Pro Plan</h5>
                    <p class="lead fw-bold mb-3">$19.99</p>
                    <ul class="list-unstyled mb-4">
                        <li class="py-2">Feature 1</li>
                        <li class="py-2">Feature 2</li>
                    </ul>
                    <button class="btn btn-primary">Choose Plan</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
