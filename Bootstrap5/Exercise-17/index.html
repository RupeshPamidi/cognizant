<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 17: Bootstrap Icons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container mt-5">
        <h2>Exercise 17.1: Social Media Icons in Footer</h2>
        <footer class="mt-5 pt-5 border-top">
            <div class="d-flex justify-content-center gap-4 mb-4">
                <a href="#" class="text-decoration-none text-dark"><i class="bi bi-facebook fs-4"></i></a>
                <a href="#" class="text-decoration-none text-dark"><i class="bi bi-twitter fs-4"></i></a>
                <a href="#" class="text-decoration-none text-dark"><i class="bi bi-instagram fs-4"></i></a>
                <a href="#" class="text-decoration-none text-dark"><i class="bi bi-linkedin fs-4"></i></a>
            </div>
            <p class="text-center text-muted">© 2024 My Company</p>
        </footer>

        <h2 class="mt-5">Exercise 17.2: Icon-Only Buttons</h2>
        <div class="mt-4">
            <button class="btn btn-primary"><i class="bi bi-search"></i></button>
            <button class="btn btn-success"><i class="bi bi-check-circle"></i></button>
            <button class="btn btn-danger"><i class="bi bi-trash"></i></button>
            <button class="btn btn-warning"><i class="bi bi-exclamation-circle"></i></button>
            <button class="btn btn-info"><i class="bi bi-info-circle"></i></button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
