<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS3 Exercise 08</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="eventCard">
        <h2>Box Model and Layout Control</h2>
        <p>Use margin, padding, border, and outline to create space and highlight selected fields.</p>
        <form>
            <label for="name">Name</label><br>
            <input id="name" class="input-highlight" type="text" placeholder="Enter your name"><br><br>
            <label for="email">Email</label><br>
            <input id="email" type="email" placeholder="Enter your email"><br><br>
            <p class="hidden-note">This note is hidden using visibility:hidden.</p>
            <p class="removed-note">This note is removed using display:none.</p>
        </form>
    </section>
</body>
</html>
