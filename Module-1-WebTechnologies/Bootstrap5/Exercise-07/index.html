<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 7: Typography</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="display-1">Display 1 Heading</h1>
        <p class="lead">This is a lead paragraph with emphasis and larger font size.</p>
        <p class="text-muted">This text is muted (grayed out)</p>
        <p class="fw-bold">This text is bold using Bootstrap utility</p>
        
        <hr class="my-4">
        
        <h2>Exercise 7.2: Text Transformation</h2>
        <p class="text-uppercase">this text is uppercase</p>
        <p class="text-lowercase">THIS TEXT IS LOWERCASE</p>
        <p class="text-capitalize">this text is capitalized</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
