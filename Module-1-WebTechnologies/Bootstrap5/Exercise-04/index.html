<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 4: Column Layouts and Grid Classes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Exercise 4.1: Two-Column Layout</h2>
        <div class="row mt-4">
            <div class="col-md-3">
                <div class="bg-info text-white p-4">Sidebar (col-md-3)</div>
            </div>
            <div class="col-md-9">
                <div class="bg-light p-4">Content Area (col-md-9)</div>
            </div>
        </div>

        <h2 class="mt-5">Exercise 4.2: Four-Column Layout</h2>
        <div class="row mt-4">
            <div class="col-sm-3 mb-3">
                <div class="bg-warning p-4">Col 1</div>
            </div>
            <div class="col-sm-3 mb-3">
                <div class="bg-warning p-4">Col 2</div>
            </div>
            <div class="col-sm-3 mb-3">
                <div class="bg-warning p-4">Col 3</div>
            </div>
            <div class="col-sm-3 mb-3">
                <div class="bg-warning p-4">Col 4</div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
