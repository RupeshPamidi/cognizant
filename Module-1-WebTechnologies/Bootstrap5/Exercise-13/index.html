<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 13: Colors and Backgrounds</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Exercise 13.1: Dashboard with Background Colors</h2>
        <div class="row mt-4">
            <div class="col-md-3 mb-3">
                <div class="bg-primary text-white p-4">Primary Box</div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="bg-success text-white p-4">Success Box</div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="bg-warning text-dark p-4">Warning Box</div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="bg-danger text-white p-4">Danger Box</div>
            </div>
        </div>

        <h2 class="mt-5">Exercise 13.2: Gradient Backgrounds</h2>
        <div class="row mt-4">
            <div class="col-md-6 mb-3">
                <div class="bg-gradient bg-dark text-white p-5">
                    <h4>Gradient Background</h4>
                    <p>This section uses bg-gradient with bg-dark</p>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <div class="bg-gradient bg-primary text-white p-5">
                    <h4>Primary Gradient</h4>
                    <p>This is a primary gradient background</p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
