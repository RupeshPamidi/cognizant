<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 5: Alignment and Reordering</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Exercise 5.1: Centered Content</h2>
        <div class="row justify-content-center align-items-center" style="height: 200px;">
            <div class="col-md-6">
                <div class="bg-primary text-white p-5 text-center">Centered Content</div>
            </div>
        </div>

        <h2 class="mt-5">Exercise 5.2: Column Reordering</h2>
        <div class="row mt-4">
            <div class="col-md-6 order-md-2">
                <div class="bg-danger text-white p-4">First in code, appears second on MD+</div>
            </div>
            <div class="col-md-6 order-md-1">
                <div class="bg-success text-white p-4">Second in code, appears first on MD+</div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
