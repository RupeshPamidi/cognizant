<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 3: Responsive Grid Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Responsive Grid Layout</h1>
        <div class="row mt-4">
            <!-- Stack on mobile (col-12), 2 per row on tablet (col-md-6), 3 per row on desktop (col-lg-4) -->
            <div class="col-12 col-md-6 col-lg-4 mb-3">
                <div class="bg-primary text-white p-4">Column 1</div>
            </div>
            <div class="col-12 col-md-6 col-lg-4 mb-3">
                <div class="bg-secondary text-white p-4">Column 2</div>
            </div>
            <div class="col-12 col-md-6 col-lg-4 mb-3">
                <div class="bg-success text-white p-4">Column 3</div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
