<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Community Event Portal - Geolocation</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f8fafc; }
        .geo-card { max-width: 640px; margin: 2rem auto; padding: 1.75rem; background: white; border-radius: 18px; }
        button { background: #2563eb; color: white; border: none; padding: 0.9rem 1.4rem; border-radius: 999px; cursor: pointer; }
        .coords { margin-top: 1rem; font-weight: 600; }
    </style>
</head>
<body>
    <main class="geo-card">
        <h1>Find Nearby Events</h1>
        <button onclick="findNearbyEvents()">Find Nearby Events</button>
        <p id="locationOutput" class="coords">Coordinates will appear here.</p>
    </main>
    <script>
        function findNearbyEvents() {
            const output = document.getElementById('locationOutput');
            if (!navigator.geolocation) {
                output.textContent = 'Geolocation is not supported by your browser.';
                return;
            }
            navigator.geolocation.getCurrentPosition(
                position => {
                    output.textContent = `Latitude: ${position.coords.latitude.toFixed(5)}, Longitude: ${position.coords.longitude.toFixed(5)}`;
                },
                error => {
                    switch (error.code) {
                        case error.PERMISSION_DENIED:
                            output.textContent = 'Permission denied. Allow location access to find nearby events.';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            output.textContent = 'Position unavailable. Please try again.';
                            break;
                        case error.TIMEOUT:
                            output.textContent = 'Request timed out. Please try again.';
                            break;
                        default:
                            output.textContent = 'An unknown error occurred.';
                            break;
                    }
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }
    </script>
</body>
</html>
