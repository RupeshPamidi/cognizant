<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Community Event Portal - Gallery</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f1f5f9; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 0.75rem; text-align: center; vertical-align: top; }
        .gallery-image { border: 3px solid #334155; border-radius: 12px; width: 100%; max-width: 240px; }
        caption { caption-side: bottom; padding-top: 0.75rem; font-style: italic; }
    </style>
</head>
<body>
    <!-- Main -->
    <main>
        <h1>Community Events Gallery</h1>
        <table>
            <tr>
                <td>
                    <img class="gallery-image" src="https://via.placeholder.com/240x160.png?text=Cleanup" alt="Community Cleanup" title="Community Cleanup" />
                    <caption>Community Cleanup</caption>
                </td>
                <td>
                    <img class="gallery-image" src="https://via.placeholder.com/240x160.png?text=Food+Drive" alt="Food Drive" title="Food Drive" />
                    <caption>Food Drive</caption>
                </td>
                <td>
                    <img class="gallery-image" src="https://via.placeholder.com/240x160.png?text=Art+Fair" alt="Arts Fair" title="Arts Fair" />
                    <caption>Arts Fair</caption>
                </td>
            </tr>
            <tr>
                <td>
                    <img class="gallery-image" src="https://via.placeholder.com/240x160.png?text=Music+Night" alt="Music Night" title="Music Night" />
                    <caption>Music Night</caption>
                </td>
                <td>
                    <img class="gallery-image" src="https://via.placeholder.com/240x160.png?text=Garden+Tour" alt="Garden Tour" title="Garden Tour" />
                    <caption>Garden Tour</caption>
                </td>
                <td>
                    <img class="gallery-image" src="https://via.placeholder.com/240x160.png?text=Sports+Day" alt="Sports Day" title="Sports Day" />
                    <caption>Sports Day</caption>
                </td>
            </tr>
        </table>
    </main>
</body>
</html>
