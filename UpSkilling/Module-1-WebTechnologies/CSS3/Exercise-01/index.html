<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS3 Exercise 01</title>
    <style>
        body { background: #f3f4f6; }
        .embedded-banner { padding: 1.5rem 1rem; text-align: center; }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="portal-header embedded-banner">
        <h1 class="portal-title" style="color: red;">Local Community Event Portal</h1>
        <p>Inline, embedded, and external CSS are all demonstrated here.</p>
    </header>
    <section class="event-card">
        <h2>Event Portal Overview</h2>
        <p>This page uses an inline style for the title, an embedded style tag in the head, and an external stylesheet for reusable portal styling.</p>
        <a href="#" class="cta-button">Learn More</a>
    </section>
</body>
</html>
